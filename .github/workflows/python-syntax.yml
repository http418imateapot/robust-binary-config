name: Python Syntax

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  py-compile:
    name: Python syntax check
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check Python syntax (py_compile)
        run: |
          files=$(find . -name "*.py" -not -path "./.git/*")
          if [ -z "$files" ]; then
            echo "No Python files found — skipping."
            exit 0
          fi
          echo "$files" | xargs python -m py_compile
          echo "All Python files passed syntax check."
