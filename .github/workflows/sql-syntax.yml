name: SQL Syntax

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sql-parse:
    name: SQL syntax check
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Check SQL syntax (sqlfluff parse)
        run: |
          files=$(find . -name "*.sql" -not -path "./.git/*")
          if [ -z "$files" ]; then
            echo "No SQL files found — skipping."
            exit 0
          fi
          echo "$files" | xargs sqlfluff parse --dialect ansi
          echo "All SQL files passed syntax check."
